<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест CSS</title>
  <!-- ПОДКЛЮЧАЕМ ВНЕШНИЙ CSS -->
  <link rel="stylesheet" href="style.css" />
  <!-- ДОБАВЛЯЕМ ВРЕМЕННЫЙ СТИЛЬ, ЧТОБЫ ПРОВЕРИТЬ, РАБОТАЕТ ЛИ HTML -->
  <style>
    /* этот стиль сработает, даже если внешний не загрузится */
    body { background: lightblue; }
  </style>
</head>
<body>
  <h1>Привет, мир!</h1>
  <p>Если этот текст красный, значит внешний CSS работает.</p>
  <p>Если фон синий, а текст чёрный – внешний CSS не загрузился.</p>
</body>
</html>
